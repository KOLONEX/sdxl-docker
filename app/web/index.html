<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SDXL · Prompt → Imagen</title>
<style>
  :root { --bg:#0e0f13; --panel:#1a1c22; --accent:#5b8cff; --text:#e6e8ee; --muted:#8a8f9c; --border:#2a2d36; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
  header { padding:12px 18px; font-weight:600; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .hright { display:flex; align-items:center; gap:10px; }
  #kolonex { color:var(--accent); font-size:12px; font-weight:600; border:1px solid var(--border); border-radius:6px; padding:4px 9px; }
  #kolonex:hover { border-color:var(--accent); }
  #lang { display:flex; gap:4px; }
  #lang button { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:4px 9px; font-size:12px; font-weight:600; cursor:pointer; }
  #lang button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  main { flex:1; display:flex; min-height:0; }
  #sidebar { width:320px; padding:16px; border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
  .seg { display:flex; gap:4px; }
  .seg button { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:8px; font-size:13px; font-weight:600; cursor:pointer; }
  .seg button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  #drop { border:2px dashed #3a3e49; border-radius:10px; padding:18px; text-align:center; color:var(--muted); cursor:pointer; }
  #drop.drag { border-color:var(--accent); color:var(--text); }
  #preview { max-width:100%; border-radius:8px; display:none; margin-top:8px; }
  label { font-size:13px; color:var(--muted); display:flex; flex-direction:column; gap:4px; }
  .lblrow { display:flex; align-items:center; gap:6px; }
  .row { display:flex; gap:10px; }
  .row > label { flex:1; }
  .check { flex-direction:row; align-items:center; gap:8px; cursor:pointer; }
  .check input { width:auto; }
  .help { display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px;
          border-radius:50%; border:1px solid var(--muted); color:var(--muted); font-size:10px;
          font-weight:700; cursor:help; position:relative; flex:none; user-select:none; }
  .help:hover { border-color:var(--accent); color:var(--accent); }
  .help .tip { display:none; position:absolute; top:140%; left:0; width:230px; background:#23262f;
               border:1px solid var(--border); border-radius:8px; padding:9px 11px; font-size:11px;
               font-weight:400; color:var(--text); line-height:1.45; z-index:20; text-align:left;
               white-space:normal; box-shadow:0 8px 24px rgba(0,0,0,.55); }
  .help:hover .tip, .help:focus .tip { display:block; }
  .help .tip b { color:var(--accent); font-weight:600; }
  input, select, textarea { background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:7px; font-family:inherit; width:100%; }
  textarea { resize:vertical; }
  select[multiple] { padding:4px; }
  button#generate { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:11px; font-weight:600; cursor:pointer; }
  button#generate:disabled { opacity:.5; cursor:not-allowed; }
  #content { flex:1; position:relative; min-width:0; overflow-y:auto; padding:16px; }
  #gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  figure { margin:0; background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  figure img { width:100%; display:block; }
  figcaption { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 10px; font-size:12px; color:var(--muted); }
  figcaption .fc-acts { display:flex; gap:10px; }
  figcaption a, figcaption button.link { color:var(--accent); background:none; border:0; padding:0; font:inherit; cursor:pointer; }
  #placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; text-align:center; padding:20px; }
  #overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; background:rgba(10,11,15,.6); z-index:10; }
  .spinner { width:42px; height:42px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #status { font-size:12px; color:var(--muted); min-height:16px; }
  #status.err { color:#ff6b6b; }
  a { text-decoration:none; }
  /* ---- history column ---- */
  #history { width:300px; border-left:1px solid var(--border); display:flex; flex-direction:column; min-height:0; transition:width .18s ease; }
  #history.collapsed { width:40px; }
  #hist-head { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--border); }
  #hist-title { font-size:13px; font-weight:600; }
  #hist-toggle { background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:4px 8px; cursor:pointer; font-weight:600; }
  #hist-body { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:10px; }
  #history.collapsed #hist-title, #history.collapsed #hist-body { display:none; }
  #hist-empty { color:var(--muted); font-size:12px; text-align:center; padding:14px 6px; }
  .hist-item { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:8px; }
  .hist-top { display:flex; gap:8px; }
  .thumb { width:64px; height:64px; object-fit:cover; border-radius:6px; cursor:pointer; flex:none; border:1px solid var(--border); }
  .hist-meta { min-width:0; display:flex; flex-direction:column; gap:3px; }
  .hist-prompt { font-size:12px; color:var(--text); line-height:1.3; max-height:48px; overflow:hidden; }
  .hist-badges { font-size:10px; color:var(--muted); }
  .hist-acts { display:flex; gap:6px; margin-top:7px; }
  .hist-acts button { flex:1; background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:4px; font-size:11px; font-weight:600; cursor:pointer; }
  .hist-acts button:hover { border-color:var(--accent); color:var(--accent); }
  .hist-acts .del { flex:none; }
  details.hist-det { margin-top:6px; }
  details.hist-det summary { font-size:11px; color:var(--muted); cursor:pointer; }
  .hist-params { margin-top:5px; display:flex; flex-direction:column; gap:2px; }
  .hist-params > div { display:flex; justify-content:space-between; gap:10px; font-size:10.5px; color:var(--text); }
  .hist-params .pk { color:var(--muted); }
  .hist-params span:last-child { text-align:right; word-break:break-word; max-width:60%; }
</style>
</head>
<body>
<header>
  <span>SDXL · Prompt → <span data-i18n="hImg">Imagen</span></span>
  <span class="hright">
    <a id="kolonex" href="https://kolonex.net" target="_blank" rel="noopener" data-i18n="kolonex">Parte de KOLONEX</a>
    <span id="lang"><button data-lang="es">ES</button><button data-lang="en">EN</button></span>
  </span>
</header>
<main>
  <aside id="sidebar">
    <div id="mode" class="seg">
      <button data-mode="txt2img" class="active" data-i18n="modeTxt">txt2img</button>
      <button data-mode="img2img" data-i18n="modeImg">img2img</button>
    </div>

    <div id="img2img-box" style="display:none">
      <div id="drop" data-i18n-html="drop">Arrastrá una imagen acá<br>o hacé click para elegir</div>
      <input id="file" type="file" accept="image/*" hidden>
      <img id="preview" alt="preview">
      <label style="margin-top:10px">
        <span class="lblrow"><span data-i18n="denoiseLabel">Denoise</span>
          <span class="help" tabindex="0">?<span class="tip" data-i18n-html="denoiseTip"></span></span>
        </span>
        <input id="denoise" type="number" value="0.6" min="0" max="1" step="0.05">
      </label>
    </div>

    <label>
      <span data-i18n="promptLabel">Prompt</span>
      <textarea id="prompt" rows="3" placeholder="a sci-fi cargo spaceship, concept art, single object, plain background"></textarea>
    </label>
    <label>
      <span data-i18n="negativeLabel">Negative prompt</span>
      <textarea id="negative" rows="2" placeholder="blurry, text, watermark, multiple objects"></textarea>
    </label>

    <div class="row">
      <label>
        <span class="lblrow"><span data-i18n="stepsLabel">Steps</span>
          <span class="help" tabindex="0">?<span class="tip" data-i18n-html="stepsTip"></span></span>
        </span>
        <input id="steps" type="number" value="30" min="1" max="150">
      </label>
      <label>
        <span class="lblrow"><span data-i18n="cfgLabel">CFG</span>
          <span class="help" tabindex="0">?<span class="tip" data-i18n-html="cfgTip"></span></span>
        </span>
        <input id="cfg" type="number" value="7" min="0" max="30" step="0.5">
      </label>
    </div>

    <label>
      <span class="lblrow"><span data-i18n="samplerLabel">Sampler</span>
        <span class="help" tabindex="0">?<span class="tip" data-i18n-html="samplerTip"></span></span>
      </span>
      <select id="sampler">
        <option value="dpmpp_2m" selected>DPM++ 2M</option>
        <option value="dpmpp_sde">DPM++ SDE</option>
        <option value="euler">Euler</option>
        <option value="euler_a">Euler a</option>
        <option value="ddim">DDIM</option>
      </select>
    </label>

    <div class="row" id="size-row">
      <label>
        <span class="lblrow"><span data-i18n="widthLabel">Ancho</span>
          <span class="help" tabindex="0">?<span class="tip" data-i18n-html="sizeTip"></span></span>
        </span>
        <input id="width" type="number" value="1024" min="512" max="2048" step="8">
      </label>
      <label>
        <span data-i18n="heightLabel">Alto</span>
        <input id="height" type="number" value="1024" min="512" max="2048" step="8">
      </label>
    </div>

    <label>
      <span class="lblrow"><span data-i18n="seedLabel">Seed (0 = aleatorio)</span>
        <span class="help" tabindex="0">?<span class="tip" data-i18n-html="seedTip"></span></span>
      </span>
      <input id="seed" type="number" value="0" min="0">
    </label>

    <label>
      <span class="lblrow"><span data-i18n="batchLabel">Cantidad de imágenes</span>
        <span class="help" tabindex="0">?<span class="tip" data-i18n-html="batchTip"></span></span>
      </span>
      <div id="batch-sel" class="seg">
        <button data-n="1" class="active">1</button>
        <button data-n="2">2</button>
        <button data-n="3">3</button>
        <button data-n="4">4</button>
      </div>
      <input id="batch" type="hidden" value="1">
    </label>

    <label>
      <span class="lblrow"><span data-i18n="lorasLabel">LoRAs</span>
        <span class="help" tabindex="0">?<span class="tip" data-i18n-html="lorasTip"></span></span>
      </span>
      <select id="loras" multiple size="4"></select>
    </label>
    <label>
      <span data-i18n="loraWeightLabel">Peso LoRA</span>
      <input id="loraweight" type="number" value="1.0" min="-2" max="2" step="0.1">
    </label>

    <label class="check">
      <input id="use_refiner" type="checkbox" checked>
      <span class="lblrow"><span data-i18n="refinerLabel">Refiner</span>
        <span class="help" tabindex="0">?<span class="tip" data-i18n-html="refinerTip"></span></span>
      </span>
    </label>
    <label>
      <span data-i18n="refinerSwitchLabel">Refiner switch</span>
      <input id="refiner_switch" type="number" value="0.8" min="0" max="1" step="0.05">
    </label>
    <label class="check">
      <input id="remove_background" type="checkbox">
      <span class="lblrow"><span data-i18n="rembgLabel">Quitar fondo</span>
        <span class="help" tabindex="0">?<span class="tip" data-i18n-html="rembgTip"></span></span>
      </span>
    </label>

    <button id="generate" data-i18n="generate">Generar</button>
    <div id="status"></div>
  </aside>

  <section id="content">
    <div id="placeholder" data-i18n="placeholder">Los resultados aparecen acá</div>
    <div id="gallery"></div>
    <div id="overlay"><div class="spinner"></div><div data-i18n="generating">Generando…</div></div>
  </section>

  <aside id="history">
    <div id="hist-head">
      <span id="hist-title" data-i18n="historyTitle">Historial</span>
      <button id="hist-toggle" title="Historial">»</button>
    </div>
    <div id="hist-body">
      <div id="hist-empty" data-i18n="histEmpty">Todavía no generaste nada.</div>
      <div id="hist-list"></div>
    </div>
  </aside>
</main>

<script>
// ---- state ----
let mode = 'txt2img';
let selectedFile = null;
const $ = id => document.getElementById(id);

// ---- mode toggle ----
document.querySelectorAll('#mode button').forEach(b => b.addEventListener('click', () => {
  mode = b.dataset.mode;
  document.querySelectorAll('#mode button').forEach(x => x.classList.toggle('active', x === b));
  $('img2img-box').style.display = mode === 'img2img' ? 'block' : 'none';
  $('size-row').style.display = mode === 'img2img' ? 'none' : 'flex';
}));

// ---- batch selector (1..4) ----
document.querySelectorAll('#batch-sel button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#batch-sel button').forEach(x => x.classList.toggle('active', x === b));
  $('batch').value = b.dataset.n;
}));

// ---- history collapse ----
$('hist-toggle').addEventListener('click', () => {
  const collapsed = $('history').classList.toggle('collapsed');
  $('hist-toggle').textContent = collapsed ? '«' : '»';
});

// ---- init image (img2img) ----
const drop = $('drop'), fileInput = $('file'), preview = $('preview');
function setFile(f) {
  if (!f || !f.type.startsWith('image/')) return;
  selectedFile = f;
  preview.src = URL.createObjectURL(f);
  preview.style.display = 'block';
}
drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => setFile(e.target.files[0]));
['dragover', 'dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e => setFile(e.dataTransfer.files[0]));

// use an existing image (gallery or history) as the img2img base
async function useAsImg2img(url) {
  try {
    const blob = await (await fetch(url)).blob();
    setFile(new File([blob], 'base.png', { type: blob.type || 'image/png' }));
    document.querySelector('#mode button[data-mode="img2img"]').click();
    setStatus(t('baseSet'));
    $('sidebar').scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) { setStatus(t('errGen') + ' ' + e.message, true); }
}

// ---- LoRA list (XSS-safe) ----
async function loadLoras() {
  try {
    const r = await fetch('/loras');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const { loras } = await r.json();
    const sel = $('loras'); sel.innerHTML = '';
    for (const l of loras) {
      const o = document.createElement('option');
      o.value = l.name; o.textContent = l.name;
      sel.appendChild(o);
    }
  } catch (e) { console.warn('loras:', e); }
}
function selectedLoras() {
  const w = parseFloat($('loraweight').value);
  return [...$('loras').selectedOptions].map(o => ({ name: o.value, weight: w }));
}

// ---- gallery ----
function showImages(images) {
  const g = $('gallery'); g.innerHTML = '';
  for (const im of images) {
    const fig = document.createElement('figure');
    const img = document.createElement('img'); img.src = im.url;
    const cap = document.createElement('figcaption');
    const seed = document.createElement('span'); seed.textContent = 'seed ' + im.seed;
    const acts = document.createElement('div'); acts.className = 'fc-acts';
    const use = document.createElement('button'); use.className = 'link'; use.textContent = '↻ img2img';
    use.title = t('useImg2img'); use.addEventListener('click', () => useAsImg2img(im.url));
    const dl = document.createElement('a'); dl.href = im.url; dl.download = im.job_id + '.png'; dl.textContent = '↓ PNG';
    acts.append(use, dl);
    cap.append(seed, acts);
    fig.append(img, cap);
    g.appendChild(fig);
  }
  $('placeholder').style.display = images.length ? 'none' : 'flex';
}

// ---- history ----
async function loadHistory() {
  try {
    const r = await fetch('/history?limit=100');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const { items } = await r.json();
    const list = $('hist-list'); list.innerHTML = '';
    for (const it of items) list.appendChild(histItem(it));
    $('hist-empty').style.display = items.length ? 'none' : 'block';
  } catch (e) { console.warn('history:', e); }
}
function histItem(it) {
  const div = document.createElement('div'); div.className = 'hist-item';
  const top = document.createElement('div'); top.className = 'hist-top';
  const img = document.createElement('img'); img.className = 'thumb'; img.src = it.url;
  img.title = t('view'); img.addEventListener('click', () => showImages([{ url: it.url, seed: it.seed, job_id: it.job_id }]));
  const meta = document.createElement('div'); meta.className = 'hist-meta';
  const p = document.createElement('div'); p.className = 'hist-prompt'; p.textContent = (it.params && it.params.prompt) || '—';
  const badges = document.createElement('div'); badges.className = 'hist-badges'; badges.textContent = it.mode + ' · seed ' + it.seed;
  meta.append(p, badges);
  top.append(img, meta);

  const acts = document.createElement('div'); acts.className = 'hist-acts';
  const use = document.createElement('button'); use.textContent = '↻ img2img'; use.title = t('useImg2img');
  use.addEventListener('click', () => useAsImg2img(it.url));
  const del = document.createElement('button'); del.className = 'del'; del.textContent = '🗑'; del.title = t('del');
  del.addEventListener('click', async () => { try { await fetch('/history/' + it.job_id, { method: 'DELETE' }); } catch (e) {} loadHistory(); });
  acts.append(use, del);

  const det = document.createElement('details'); det.className = 'hist-det';
  const sum = document.createElement('summary'); sum.textContent = t('paramsSummary'); det.appendChild(sum);
  const box = document.createElement('div'); box.className = 'hist-params';
  const SHOW = ['negative_prompt', 'steps', 'cfg', 'sampler', 'width', 'height', 'seed', 'batch', 'loras', 'use_refiner', 'refiner_switch', 'remove_background', 'denoise'];
  for (const k of SHOW) {
    if (!(k in (it.params || {}))) continue;
    let v = it.params[k];
    if (Array.isArray(v)) v = v.length ? v.map(x => (x && x.name ? x.name + '@' + x.weight : String(x))).join(', ') : '—';
    const row = document.createElement('div');
    const kk = document.createElement('span'); kk.className = 'pk'; kk.textContent = k;
    const vv = document.createElement('span'); vv.textContent = String(v);
    row.append(kk, vv); box.appendChild(row);
  }
  det.appendChild(box);

  div.append(top, acts, det);
  return div;
}

// ---- generate ----
function commonBody() {
  return {
    prompt: $('prompt').value,
    negative_prompt: $('negative').value,
    steps: +$('steps').value,
    cfg: +$('cfg').value,
    sampler: $('sampler').value,
    seed: +$('seed').value,
    batch: +$('batch').value,
    loras: selectedLoras(),
    use_refiner: $('use_refiner').checked,
    refiner_switch: +$('refiner_switch').value,
    remove_background: $('remove_background').checked,
  };
}
function setStatus(msg, isErr) { const s = $('status'); s.textContent = msg; s.classList.toggle('err', !!isErr); }
$('generate').addEventListener('click', async () => {
  if (!$('prompt').value.trim()) { setStatus(t('errPrompt'), true); return; }
  const overlay = $('overlay'), btn = $('generate');
  let res;
  overlay.style.display = 'flex'; btn.disabled = true; setStatus('');
  try {
    if (mode === 'txt2img') {
      const body = { ...commonBody(), width: +$('width').value, height: +$('height').value };
      res = await fetch('/txt2img', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    } else {
      if (!selectedFile) { setStatus(t('errFile'), true); return; }
      const fd = new FormData(), b = commonBody();
      Object.entries(b).forEach(([k, v]) => { if (k !== 'loras') fd.append(k, v); });
      fd.append('denoise', $('denoise').value);
      fd.append('file', selectedFile);
      res = await fetch('/img2img', { method: 'POST', body: fd });
    }
    if (!res.ok) { setStatus('Error ' + res.status + ': ' + (await res.text()), true); return; }
    const data = await res.json();
    showImages(data.images);
    setStatus(data.count + ' ✓ · ' + (data.duration_ms / 1000).toFixed(1) + ' s');
    loadHistory();
  } catch (err) {
    setStatus(t('errGen') + ' ' + err.message, true);
  } finally {
    overlay.style.display = 'none'; btn.disabled = false;
  }
});

// ---- i18n (ES / EN) ----
const I18N = {
  es: {
    hImg: 'Imagen', kolonex: 'Parte de KOLONEX',
    modeTxt: 'txt2img', modeImg: 'img2img',
    drop: 'Arrastrá una imagen acá<br>o hacé click para elegir',
    denoiseLabel: 'Denoise', promptLabel: 'Prompt', negativeLabel: 'Negative prompt',
    stepsLabel: 'Steps', cfgLabel: 'CFG', samplerLabel: 'Sampler',
    widthLabel: 'Ancho', heightLabel: 'Alto', seedLabel: 'Seed (0 = aleatorio)', batchLabel: 'Cantidad de imágenes',
    lorasLabel: 'LoRAs', loraWeightLabel: 'Peso LoRA',
    refinerLabel: 'Refiner', refinerSwitchLabel: 'Refiner switch', rembgLabel: 'Quitar fondo',
    generate: 'Generar', generating: 'Generando…', placeholder: 'Los resultados aparecen acá',
    historyTitle: 'Historial', histEmpty: 'Todavía no generaste nada.',
    paramsSummary: 'Parámetros', useImg2img: 'Usar como base de img2img', view: 'Ver', del: 'Borrar',
    baseSet: 'Imagen cargada como base de img2img ✓',
    denoiseTip: '<b>Fuerza de img2img (0–1).</b> Cuánto se aleja del original. <b>Bajo</b> (0.3) = retoque sutil, conserva la composición. <b>Alto</b> (0.7+) = reinterpreta fuerte, copia estilo. 0.5 es un buen punto medio.',

let lang = 'es';
function t(k) { return (I18N[lang] && I18N[lang][k]) || I18N.es[k] || k; }
function applyLang(l) {
  lang = I18N[l] ? l : 'es';
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll('#lang button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  try { localStorage.setItem('sdxl_lang', lang); } catch (e) {}
  loadHistory();  // refresh labels inside history entries
}
document.querySelectorAll('#lang button').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));
let saved = null;
try { saved = localStorage.getItem('sdxl_lang'); } catch (e) {}
applyLang(saved || ((navigator.language || 'es').slice(0, 2) === 'en' ? 'en' : 'es'));
loadLoras();
loadHistory();
</script>
