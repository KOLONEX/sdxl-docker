services:
  sdxl-api:
    build: .
    image: sdxl-api
    ports:
      - "5082:8000"
    volumes:
      - ./models/loras:/models/loras
      - sdxl-outputs:/outputs
    environment:
      DEFAULT_USE_REFINER: "true"
      MAX_BATCH: "4"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]   # SDXL on GPU 1; TRELLIS uses GPU 0
              capabilities: [gpu]

volumes:
  sdxl-outputs:
